<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
        }

        .chart-container {
            position: relative;
            height: 500px;
        }

        .chart-container-large {
            height: 400px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #8892b0;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .positive {
            color: #00ff88;
        }

        .negative {
            color: #ff6b6b;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-high {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .badge-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .badge-low {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* 指标选择器样式 */
        .indicator-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .indicator-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .indicator-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .indicator-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-color: transparent;
            color: #fff;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

</head>

            {指标名称: "美国人均可支配收入", 与营业总收入的相关系数: 0.8488},
            {指标名称: "中国:GDP:不变价:当季值", 与营业总收入的相关系数: 0.7768},
            {指标名称: "美国:有效联邦基金利率(EFFR)", 与营业总收入的相关系数: 0.6256},
            {指标名称: "中国人均可支配收入", 与营业总收入的相关系数: 0.6154}, {指标名称: "欧盟GDP", 与营业总收入的相关系数: 0.8310}, {指标名称: "欧盟GDP增速", 与营业总收入的相关系数: 0.1738}, {指标名称: "欧盟基准利率", 与营业总收入的相关系数: 0.4561},
            {指标名称: "中间价:美元兑人民币", 与营业总收入的相关系数: 0.5419},
            {指标名称: "美国:CPI:季调:同比", 与营业总收入的相关系数: 0.4764},
            {指标名称: "美国:GDP:不变价:季调:折年数:同比", 与营业总收入的相关系数: 0.1974},
            {指标名称: "中国:GDP:不变价:当季同比", 与营业总收入的相关系数: -0.3382},
            {指标名称: "美国:密歇根大学消费者信心指数", 与营业总收入的相关系数: -0.3692},
            {指标名称: "美国:失业率:季调", 与营业总收入的相关系数: -0.5910},
            {指标名称: "中国:贷款基准利率:1年:前一个观测值", 与营业总收入的相关系数: -0.6656}
        ];

        // AIC分析数据
        const aicData = [
            // 滞后0期 - 按AIC升序
            {指标名称: "美国:M2:季调", 最优滞后阶数: 0, 最优AIC: 1866.54, 最优R方: 0.7447},
            {指标名称: "美国:GDP:不变价:个人消费支出:季调:折年数", 最优滞后阶数: 0, 最优AIC: 1867.61, 最优R方: 0.7401},
            {指标名称: "美国:GDP:不变价:季调:折年数", 最优滞后阶数: 0, 最优AIC: 1868.67, 最优R方: 0.7354},
            {指标名称: "美国人均可支配收入", 最优滞后阶数: 0, 最优AIC: 1871.96, 最优R方: 0.7205},
            {指标名称: "中国:GDP:不变价:当季值", 最优滞后阶数: 5, 最优AIC: 1873.66, 最优R方: 0.7567},
            {指标名称: "中国:贷款基准利率:1年:前一个观测值", 最优滞后阶数: 0, 最优AIC: 1913.33, 最优R方: 0.4431},
            {指标名称: "中间价:美元兑人民币", 最优滞后阶数: 0, 最优AIC: 1927.59, 最优R方: 0.2937},
            {指标名称: "美国:CPI:季调:同比", 最优滞后阶数: 0, 最优AIC: 1933.01, 最优R方: 0.2269},
            {指标名称: "美国:GDP:不变价:季调:折年数:同比", 最优滞后阶数: 0, 最优AIC: 1946.07, 最优R方: 0.0390},
            // 滞后1期 - 按AIC升序
            {指标名称: "美国:有效联邦基金利率(EFFR)", 最优滞后阶数: 1, 最优AIC: 1918.49, 最优R方: 0.4129},
            {指标名称: "美国:失业率:季调", 最优滞后阶数: 1, 最优AIC: 1922.53, 最优R方: 0.3721},
            {指标名称: "美国:密歇根大学消费者信心指数", 最优滞后阶数: 1, 最优AIC: 1939.55, 最优R方: 0.1662},
            // 滞后5期
            {指标名称: "中国人均可支配收入", 最优滞后阶数: 6, 最优AIC: 1876.05, 最优R方: 0.7551}, {指标名称: "欧盟GDP", 最优滞后阶数: 3, 最优AIC: 1877.06, 最优R方: 0.7247}, {指标名称: "欧盟GDP增速", 最优滞后阶数: 0, 最优AIC: 1946.61, 最优R方: 0.0302}, {指标名称: "欧盟基准利率", 最优滞后阶数: 8, 最优AIC: 1930.12, 最优R方: 0.4358},
            // 滞后6期
            {指标名称: "中国:GDP:不变价:当季同比", 最优滞后阶数: 8, 最优AIC: 1932.75, 最优R方: 0.4104}
        ];

        // 指标列表
        const indicatorList = Object.keys(timeData.indicators);
        const indicatorShortNames = {
            "美国:M2:季调": "美国M2",
            "美国:CPI:季调:同比": "美国CPI",
            "美国:GDP:不变价:个人消费支出:季调:折年数": "美国消费支出",
            "美国:GDP:不变价:季调:折年数": "美国GDP",
            "美国:有效联邦基金利率(EFFR)": "美联储利率",
            "美国:GDP:不变价:季调:折年数:同比": "美国GDP增速",
            "美国:失业率:季调": "美国失业率",
            "美国:密歇根大学消费者信心指数": "消费者信心",
            "中间价:美元兑人民币": "美元兑人民币",
            "中国:GDP:不变价:当季值": "中国GDP",
            "中国:GDP:不变价:当季同比": "中国GDP增速",
            "中国:贷款基准利率:1年:前一个观测值": "中国利率",
            "美国人均可支配收入": "美国人均收入",
            "中国人均可支配收入": "中国人均收入",
            "欧盟GDP": "欧盟GDP",
            "欧盟GDP增速": "欧盟GDP增速",
            "欧盟基准利率": "欧央行利率"
        };

        let selectedIndicators = ["美国:M2:季调", "中国:GDP:不变价:当季值"];
        let indicatorChart = null;

        // ===== 0. 苹果区域营收饼图 (2025Q4) =====
        // 数据来源: 用户提供的2025Q4数据
        // 美洲40.71%, 欧洲26.54%, 大中华区17.76%, 日本6.55%, 亚太其他8.45%
        const totalRevenue2025Q4 = 102466; // 2025Q4总营收（百万美元）
        const regionalData2025Q4 = {
            '美洲': Math.round(totalRevenue2025Q4 * 0.4071),  // 41,714
            '欧洲': Math.round(totalRevenue2025Q4 * 0.2654),  // 27,194
            '大中华区': Math.round(totalRevenue2025Q4 * 0.1776),  // 18,198
            '日本': Math.round(totalRevenue2025Q4 * 0.0655),  // 6,712
            '亚太其他': Math.round(totalRevenue2025Q4 * 0.0845)   // 8,658
        };

        const regionalCtx = document.getElementById('regionalRevenueChart').getContext('2d');
        new Chart(regionalCtx, {
            type: 'pie',
            data: {
                labels: ['美洲 (北美)', '欧洲', '大中华区', '日本', '亚太其他',],
                datasets: [{
                    data: [
                        regionalData2025Q4['美洲'],
                        regionalData2025Q4['欧洲'],
                        regionalData2025Q4['大中华区'],
                        regionalData2025Q4['日本'],
                        regionalData2025Q4['亚太其他']
                    ],
                    backgroundColor: [
                        '#3b82f6',  // 美洲 - 蓝色
                        '#10b981',  // 欧洲 - 绿色
                        '#ef4444',  // 大中华区 - 红色
                        '#f59e0b',  // 日本 - 橙色
                        '#8b5cf6'   // 亚太其他 - 紫色
                    ],
                    borderWidth: 2,
                    borderColor: '#1e293b'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#e2e8f0',
                            font: { size: 12 },
                            padding: 15
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const total = totalRevenue2025Q4;
                                const value = context.raw;
                                const percentage = ((value / total) * 100).toFixed(2);
                                return context.label + ': ' + value.toLocaleString() + ' 百万美元 (' + percentage + '%)';
                            }
                        }
                    }
                }
            }
        });

        // ===== 1. 苹果营收季度趋势 =====
        const revenueCtx = document.getElementById('revenueTrendChart').getContext('2d');
        new Chart(revenueCtx, {
            type: 'line',
            data: {
                labels: timeData.quarters,
                datasets: [{
                    label: '营业总收入 (万元)',
                    data: timeData.revenue,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointHoverRadius: 6,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#fff' } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return '营收: ' + context.raw.toLocaleString() + ' 万元';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8892b0', maxRotation: 45 }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: {
                            color: '#8892b0',
                            callback: function(value) {
                                return (value / 10000).toFixed(1) + '万亿';
                            }
                        }
                    }
                }
            }
        });

        // ===== 2. 营收与指标对比（可交互选择） =====
        function createIndicatorCompareChart() {
            const compareCtx = document.getElementById('indicatorCompareChart').getContext('2d');

            // 归一化数据（使用min-max标准化）
            function normalize(data) {
                const min = Math.min(...data);
                const max = Math.max(...data);
                return data.map(v => (v - min) / (max - min) * 100);
            }

            const datasets = [{
                label: '营业总收入',
                data: normalize(timeData.revenue),
                borderColor: '#00d4ff',
                backgroundColor: 'transparent',
                borderWidth: 3,
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'y'
            }];

            const colors = ['#ff6b6b', '#7b2cbf', '#00ff88', '#ffc107', '#ff9f43'];
            selectedIndicators.forEach((indicator, i) => {
                datasets.push({
                    label: indicatorShortNames[indicator] || indicator,
                    data: normalize(timeData.indicators[indicator]),
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 2,
                    yAxisID: 'y1'
                });
            });

            return new Chart(compareCtx, {
                type: 'line',
                data: { labels: timeData.quarters, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8892b0', maxRotation: 45 }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#00d4ff' },
                            title: { display: true, text: '营收 (归一化)', color: '#00d4ff' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            grid: { display: false },
                            ticks: { color: '#ff6b6b' },
                            title: { display: true, text: '指标 (归一化)', color: '#ff6b6b' }
                        }
                    }
                }
            });
        }

        // 初始化图表
        indicatorChart = createIndicatorCompareChart();

        // 创建指标选择器
        const selectorContainer = document.getElementById('indicatorSelector');
        indicatorList.forEach((indicator, idx) => {
            const btn = document.createElement('button');
            btn.className = 'indicator-btn' + (selectedIndicators.includes(indicator) ? ' active' : '');
            btn.textContent = indicatorShortNames[indicator] || indicator;
            btn.dataset.indicator = indicator; // 保存指标名称到data属性

            btn.onclick = function() {
                const clickedIndicator = this.dataset.indicator;

                if (selectedIndicators.includes(clickedIndicator)) {
                    if (selectedIndicators.length > 1) {
                        selectedIndicators = selectedIndicators.filter(i => i !== clickedIndicator);
                    }
                } else {
                    if (selectedIndicators.length < 3) {
                        selectedIndicators.push(clickedIndicator);
                    } else {
                        selectedIndicators.shift();
                        selectedIndicators.push(clickedIndicator);
                    }
                }

                // 更新按钮状态
                selectorContainer.querySelectorAll('.indicator-btn').forEach(b => {
                    const ind = b.dataset.indicator;
                    if (selectedIndicators.includes(ind)) {
                        b.classList.add('active');
                    } else {
                        b.classList.remove('active');
                    }
                });

                // 重新渲染图表
                indicatorChart.destroy();
                indicatorChart = createIndicatorCompareChart();
            };

            selectorContainer.appendChild(btn);
        });

        // ===== 3. 相关系数柱状图（正相关到负相关） =====
        const corrCtx = document.getElementById('correlationChart').getContext('2d');
        new Chart(corrCtx, {
            type: 'bar',
            data: {
                labels: correlationData.map(d => indicatorShortNames[d.指标名称] || d.指标名称.split(':').slice(0,2).join(':')),
                datasets: [{
                    label: '相关系数',
                    data: correlationData.map(d => d.与营业总收入的相关系数),
                    backgroundColor: correlationData.map(d =>
                        d.与营业总收入的相关系数 >= 0 ?
                        'rgba(0, 212, 255, 0.7)' : 'rgba(255, 107, 107, 0.7)'
                    ),
                    borderColor: correlationData.map(d =>
                        d.与营业总收入的相关系数 >= 0 ?
                        'rgba(0, 212, 255, 1)' : 'rgba(255, 107, 107, 1)'
                    ),
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8892b0' },
                        min: -1,
                        max: 1
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: '#fff', font: { size: 12 } }
                    }
                }
            }
        });

        // ===== 4. AIC最优滞后图 =====
        const aicCtx = document.getElementById('aicChart').getContext('2d');
        new Chart(aicCtx, {
            type: 'bar',
            data: {
                labels: aicData.map(d => indicatorShortNames[d.指标名称] || d.指标名称.split(':').slice(0, 2).join(':')),
                datasets: [{
                    label: '最优滞后阶数',
                    data: aicData.map(d => d.最优滞后阶数),
                    backgroundColor: 'rgba(123, 44, 191, 0.7)',
                    borderColor: 'rgba(123, 44, 191, 1)',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8892b0' },
                        title: { display: true, text: '滞后阶数 (季度)', color: '#8892b0' }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: '#fff', font: { size: 12 } }
                    }
                }
            }
        });

        // ===== 5. 填充表格 =====
        const tableBody = document.querySelector('#correlationTable tbody');
        correlationData.forEach((corr) => {
            const aic = aicData.find(a => a.指标名称 === corr.指标名称);
            const corrVal = corr.与营业总收入的相关系数;
            const absCorr = Math.abs(corrVal);

            let strength, badgeClass;
            if (absCorr >= 0.7) {
                strength = '强相关';
                badgeClass = 'badge-high';
            } else if (absCorr >= 0.4) {
                strength = '中等相关';
                badgeClass = 'badge-medium';
            } else {
                strength = '弱相关';
                badgeClass = 'badge-low';
            }

            const row = document.createElement('tr');
            const shortName = indicatorShortNames[corr.指标名称] || corr.指标名称.split(':').slice(0,2).join(':');
            row.innerHTML = `
                <td>${shortName}</td>
                <td class="${corrVal >= 0 ? 'positive' : 'negative'}">${corrVal.toFixed(4)}</td>
                <td><span class="badge ${badgeClass}">${strength}</span></td>
                <td>${aic ? aic.最优滞后阶数 : '-'}</td>
                <td>${aic ? aic.最优AIC.toFixed(2) : '-'}</td>
                <td>${aic ? aic.最优R方.toFixed(4) : '-'}</td>
            `;
            tableBody.appendChild(row);
        });
    </script>
